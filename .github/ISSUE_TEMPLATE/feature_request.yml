name: Feature request
description: Propose a well-scoped improvement to the repository, workflow, or contributor experience.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Please frame requests around the problem to solve, the user value, and whether the change affects Jira governance or Codex execution boundaries.

  - type: input
    id: summary
    attributes:
      label: 请求摘要
      description: 用一句话概括想要的改进。
      placeholder: 例如：增加针对 task scope 修正建议的批量预览能力
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: 当前问题 / 缺口
      description: 现在的流程哪里不够好？缺了什么？
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: 建议改进
      description: 你建议新增或改变什么？
    validations:
      required: true

  - type: textarea
    id: user_value
    attributes:
      label: 预期价值
      description: 这项改进对谁有价值？会让什么更好？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 可选。你是否考虑过其他做法？
    validations:
      required: false

  - type: dropdown
    id: jira_boundary
    attributes:
      label: 是否影响 Jira 治理边界？
      description: 例如 Sprint、Priority、Assignee、流程控制责任等。
      options:
        - No
        - Yes
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: codex_boundary
    attributes:
      label: 是否影响 Codex 执行边界？
      description: 例如 Codex 可以读取什么、执行什么、回写什么。
      options:
        - No
        - Yes
        - Not sure
    validations:
      required: true
